<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Bot Dashboard</h1>
            <p>Manage your NEPSE and Crypto bots seamlessly.</p>
        </header>

        <main class="grid">
            <!-- NEPSE Bot Section -->
            <section class="card glass">
                <div class="card-header">
                    <h2>🇳🇵 NEPSE Stock Bot</h2>
                    <span id="nepse-status" class="status-badge offline">Offline</span>
                </div>
                <div class="form-group">
                    <label for="stock-name">Stock Name</label>
                    <input type="text" id="stock-name" placeholder="e.g. RSML" value="RSML">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="target-qty">Quantity</label>
                        <input type="number" id="target-qty" placeholder="10" value="10">
                    </div>
                    <div class="form-group">
                        <label for="target-price">Price</label>
                        <input type="number" id="target-price" step="0.1" placeholder="354.8" value="354.8">
                    </div>
                </div>
                <div class="form-group">
                    <label for="total-orders">Total Orders</label>
                    <input type="number" id="total-orders" value="45">
                </div>
                <div class="btn-group">
                    <button id="run-nepse" class="btn btn-primary">Run NEPSE Bot</button>
                    <button id="stop-nepse" class="btn btn-danger">Stop</button>
                </div>
            </section>

            <!-- Crypto Bot Section -->
            <section class="card glass">
                <div class="card-header">
                    <h2>₿ Crypto Tracker</h2>
                    <span id="crypto-status" class="status-badge offline">Offline</span>
                </div>
                <div class="form-group">
                    <label for="interval">Notification Interval</label>
                    <select id="interval">
                        <option value="15m">15 Minutes</option>
                        <option value="1h">1 Hour</option>
                        <option value="4h">4 Hours</option>
                        <option value="1d">1 Day</option>
                        <option value="test">Test (10s)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="coins">Coins (Space separated)</label>
                    <input type="text" id="coins" value="BTCUSDT ETHUSDT BNBUSDT SOLUSDT XRPUSDT DOGEUSDT">
                </div>
                <div class="btn-group">
                    <button id="run-crypto" class="btn btn-crypto">Run Crypto Bot</button>
                    <button id="stop-crypto" class="btn btn-danger">Stop</button>
                </div>
            </section>
        </main>

        <section class="card glass logs-section">
            <div class="card-header">
                <h2>Real-time Notifications</h2>
                <button id="clear-logs" class="btn btn-secondary">Clear</button>
            </div>
            <div id="logs" class="logs-container">
                <p class="placeholder">Awaiting bot activity...</p>
            </div>
        </section>

        <footer class="glass">
            <p>&copy; 2026 AI Bot Suite. All rights reserved.</p>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
