name: Crypto SAR Signal

# Sends the hourly status message (price table + indicators + BUY/SELL/WAIT)
# and, on a SAR flip of the last CLOSED hourly candle, the flip alert. The
# bot's last SAR side is stored in crypto_state.json, which this workflow
# commits back to the repo whenever it changes, so runs continue seamlessly
# across GitHub's ephemeral runners.
#
# This MUST stay the repo's only scheduled workflow. Measured over 12h,
# GitHub delivers this repo ~1 scheduled run per HOUR in total, no matter what
# is requested: a */5 cron here returned 6.5% of its runs, and splitting the
# status message into a second workflow made both worse — the two competed for
# that single hourly slot and the status message degraded to every 2-4h.
# Adding another scheduled workflow, or a tighter cron, takes runs away from
# this one rather than adding any.
on:
  schedule:
    # Hourly at :05, shortly after the 1h candle closes. GitHub still delays
    # and drops these (observed gaps: 1-3h) — it is best-effort and there is no
    # cron setting that fixes it. Low-latency alerting needs an always-on host
    # running run_bot(), not this workflow.
    - cron: "5 * * * *"
  # Lets you trigger a run manually from the Actions tab to test.
  workflow_dispatch:

# Needed so the job can commit the updated state file back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing on the state file.
concurrency:
  group: crypto-signal
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one signal check
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional — if unset, the AI insight line is simply omitted.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python crypto_tracker.py --once --interval 1h

      - name: Persist state if SAR flipped
        run: |
          if ! git diff --quiet -- crypto_state.json; then
            echo "SAR state changed — committing."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add crypto_state.json
            git commit -m "chore: update SAR state [skip ci]"
            # Rebase before pushing: main may have moved since checkout, and a
            # rejected push here would lose the flip — the next run would then
            # re-alert on the same flip it already sent.
            git pull --rebase --autostash
            git push
          else
            echo "No SAR flip this run — nothing to persist."
          fi
