name: Crypto SAR Signal

# Polls for a SAR flip on the last CLOSED hourly candle, in the cloud — no
# laptop needed. The bot's last SAR side is stored in crypto_state.json, which
# this workflow commits back to the repo whenever it changes, so runs continue
# seamlessly across GitHub's ephemeral runners.
#
# The hourly status message lives in crypto-status.yml. This workflow is
# flip-alerts only (SEND_STATUS_UPDATE=false) — at this cadence the status
# table would otherwise arrive 288x a day.
on:
  schedule:
    # Every 5 minutes — GitHub's shortest allowed interval.
    #
    # This is deliberately far more often than the 1h candle it watches.
    # GitHub's scheduler is best-effort: it delays scheduled runs under load and
    # silently DROPS them entirely at peak, which is what made hourly runs land
    # up to 2h apart. Flip detection compares the closed candle against saved
    # state, not against the previous run, so it is idempotent — a dropped tick
    # costs nothing and the next one still catches the flip. Polling often turns
    # GitHub's unreliability from a 2h gap into a ~15min worst case.
    - cron: "*/5 * * * *"
  # Lets you trigger a run manually from the Actions tab to test.
  workflow_dispatch:

# Needed so the job can commit the updated state file back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing on the state file.
concurrency:
  group: crypto-signal
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one signal check
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Flip alerts only — the status table is crypto-status.yml's job.
          SEND_STATUS_UPDATE: "false"
          # Optional — if unset, the AI insight line is simply omitted.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python crypto_tracker.py --once --interval 1h

      - name: Persist state if SAR flipped
        run: |
          if ! git diff --quiet -- crypto_state.json; then
            echo "SAR state changed — committing."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add crypto_state.json
            git commit -m "chore: update SAR state [skip ci]"
            # Rebase before pushing: main may have moved since checkout, and a
            # rejected push here would lose the flip — the next run would then
            # re-alert on the same flip it already sent.
            git pull --rebase --autostash
            git push
          else
            echo "No SAR flip this run — nothing to persist."
          fi
